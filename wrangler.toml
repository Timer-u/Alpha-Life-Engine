name = "alpha-life-engine"
main = "_worker.js"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

vars = { ENVIRONMENT = "development", LOG_LEVEL = "debug", SESSION_DAYS = "7" }

[[d1_databases]]
binding = "DB"
database_name = "alpha-life-dev"
database_id = "a491d7ba-045d-4303-a10b-ae25591e8164"

[env.production]
name = "alpha-life-engine"
routes = [
  { pattern = "alpha-life.yourdomain.com/*", zone_name = "yourdomain.com" }
]
vars = { ENVIRONMENT = "production", LOG_LEVEL = "info", SESSION_DAYS = "7" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "alpha-life-prod"
database_id = "c79c0075-f608-4ced-9f70-1ca98698ee3e"
