name: CI — Verify Dependency Updates

on:
  push:
    branches: [main]
    paths:
      - "scripts/local_evolver/**/*.py"
      - "data/**/*.py"
      - "pyproject.toml"
      - "scripts/local_evolver/requirements.txt"
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/*.yml"
      - ".github/dependabot.yml"
      - "scripts/local_evolver/**/*.py"
      - "data/**/*.py"
      - "pyproject.toml"
      - "scripts/local_evolver/requirements.txt"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  verify-ts:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        node-version: [24.x]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run types

      - name: Lint
        run: npm run lint

      - name: Build (Vite)
        run: npm run build

      - name: Upload build artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-error-log-${{ matrix.node-version }}
          path: |
            dist/
            *.log
          retention-days: 3

  verify-python:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Python lint (ruff)
        run: ruff check scripts/local_evolver/ data/

      - name: Python format check (ruff)
        run: ruff format --check scripts/local_evolver/ data/

      - name: Python typecheck (mypy)
        run: mypy --strict scripts/local_evolver/ data/

      - name: Python security (bandit)
        run: bandit -r scripts/local_evolver/ data/ -c pyproject.toml
