name: CI — Verify Dependency Updates

on:
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/*.yml"
      - ".github/dependabot.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        node-version: [24.x]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run types

      - name: Lint
        run: npm run lint

      - name: Build (Vite)
        run: npm run build

      - name: Upload build artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-error-log-${{ matrix.node-version }}
          path: |
            dist/
            *.log
          retention-days: 3
