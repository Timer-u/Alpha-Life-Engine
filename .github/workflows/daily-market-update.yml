#!/bin/bash
# GitHub Actions 工作流 - 每日市场数据更新
# 此脚本由 GitHub Actions 自动执行

name: Daily Market Data Update
on:
  schedule:
    # 周一到周五下午 4 点 UTC+8，即东八区下午 4 点（16:00）
    # 这是中国股市收盘后半小时
    - cron: '0 8 * * 1-5'  # UTC 时间 8 点 = 东八区 16 点
  
  # 手动触发选项
  workflow_dispatch:

jobs:
  update-market-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Download latest market data
        env:
          BAOSTOCK_API_KEY: \${{ secrets.BAOSTOCK_API_KEY }}
        run: |
          echo "Downloading latest market data..."
          npm run baoStock:update
          echo "Market data download completed"
      
      - name: Commit changes
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add -A
            git commit -m "Update market data - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
      
      - name: Upload to Cloudflare D1
        env:
          CLOUDFLARE_API_TOKEN: \${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: \${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler
          npm run database:migrate -- --env production
          echo "Database migration completed"
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Market data update failed"
          # 可以在这里添加邮件通知等
