name: Daily Market Data Update

on:
  schedule:
    # 交易日 08:00 CST (00:00 UTC) — 取前一交易日数据
    - cron: '0 0 * * 1-5'
  workflow_dispatch:
    inputs:
      env:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - development

jobs:
  update-market-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install baostock pandas

      - name: Install Node dependencies
        run: npm ci

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Download latest market data (BaoStock)
        env:
          BAOSTOCK_API_KEY: ${{ secrets.BAOSTOCK_API_KEY }}
        run: npx tsx scripts/daily-market-update.ts ${{ github.event.inputs.env == 'development' && '--local' || '--prod' }}

      - name: Notify on failure
        if: failure()
        run: echo "❌ Market data update failed for $(date -u)"
